# Local SonarQube Community Build analysis configuration.
#
# This file is intentionally outside the repository root and is supplied via
# -Dproject.settings by scripts/run_local_sonarqube.py. Keeping it separate
# preserves this repository's SonarQube Cloud Automatic Analysis setup, which
# must not have a root sonar-project.properties file.

sonar.projectKey=dicom-viewer-v3
sonar.projectName=DICOM Viewer V3 (local)
sonar.sources=src
sonar.tests=tests
sonar.sourceEncoding=UTF-8
sonar.python.version=3.12

# Do not index developer-local, generated, or packaged artifacts as code.
sonar.exclusions=tmp/**,venv/**,.venv/**,build/**,dist/**,backups/**,.sonar-local/**,reports/**

# DICOM fixtures are binary test inputs, not source files for static analysis.
sonar.test.exclusions=tests/fixtures/**
