# SonarQube Cloud — Automatic Analysis configuration
# Docs: https://docs.sonarsource.com/sonarqube-cloud/advanced-setup/automatic-analysis/
#
# This project uses SonarCloud Automatic Analysis (GitHub App), which reads
# `.sonarcloud.properties` only — not `sonar-project.properties`.
# Wildcard patterns are not allowed here; use plain directory paths.
#
# Goal: analyze application code under src/ as sources, and tests/ as tests,
# so mock fixture paths and float asserts in tests do not fail the PR quality
# gate Security/Reliability ratings on "new code".
#
# Per-rule ignores (e.g. python:S5443 on tests) are not supported in this file
# for Automatic Analysis — set them under SonarCloud → Administration →
# General Settings → Analysis Scope if needed after sources/tests are correct.

sonar.sources=src
sonar.tests=tests
sonar.sourceEncoding=UTF-8
sonar.python.version=3.12

# Keep non-product trees out of the main source index.
sonar.exclusions=tmp,venv,.venv,build,dist,backups
