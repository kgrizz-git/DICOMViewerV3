name: User docs links

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'user-docs/**'
      - 'dev-docs/README.md'
  push:
    branches:
      - main
    paths:
      - 'user-docs/**'
      - 'dev-docs/README.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-relative-links:
    name: Check user-docs relative links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Run link checker
        run: python scripts/check_user_docs_links.py --root "${{ github.workspace }}"
