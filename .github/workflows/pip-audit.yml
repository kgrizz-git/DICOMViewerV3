name: pip-audit

# Scans Python dependencies for known vulnerabilities (CVE/GHSA) via pip-audit.
# Complements Grype (binary/system-level CVE scanning) with PyPI-level checks.
# Runs weekly + on PRs that touch requirements files.

on:
  schedule:
    - cron: "0 6 * * 1"   # 6 AM UTC every Monday
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "requirements.txt"
      - "requirements-dev.txt"
      - "requirements-build.txt"
      - "requirements-phi-tools.txt"
  push:
    branches:
      - main
      - develop
    paths:
      - "requirements.txt"
      - "requirements-dev.txt"
      - "requirements-build.txt"
      - "requirements-phi-tools.txt"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pip-audit:
    name: pip-audit (dependency CVEs)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install "pip-audit>=2.10.1"

      - name: Run pip-audit
        # Temporary exceptions are documented with removal criteria in
        # security/pip-audit-exceptions.md. Do not add or broaden exceptions
        # without an explicit security review.
        run: >-
          pip-audit --requirement requirements.txt --requirement requirements-dev.txt
          --requirement requirements-build.txt --ignore-vuln PYSEC-2026-2266
          --ignore-vuln PYSEC-2026-2132
          --ignore-vuln CVE-2026-52870 --ignore-vuln CVE-2026-52869
          --ignore-vuln CVE-2026-59950

      # PhiScan's Click constraint conflicts with Semgrep and Presidio currently
      # requires NumPy <2.5 while the application requires NumPy >=2.5.1. Audit
      # the intentionally isolated PHI-tools environment independently.
      - name: Run pip-audit for isolated PHI tooling
        run: pip-audit --requirement requirements-phi-tools.txt
