version: 2
updates:
  # Python dependencies (pip)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 10
    reviewers:
      - "GitHub-Copilot"
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "ci(deps):"
      include: "scope"
    pull-request-branch-name:
      separator: "/"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci(actions):"
  # Docker: add a `docker` package-ecosystem block here only after a Dockerfile
  # exists at the repo root (or set directory to the folder that contains it).
  # Dependabot errors if `docker` is enabled without a matching Dockerfile.
